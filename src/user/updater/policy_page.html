<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Policy Rule Manager</title>
  <style>
    :root {
      --bg: radial-gradient(120deg, #f4f6ff 0%, #eef7f4 50%, #f9efff 100%);
      --panel: rgba(255, 255, 255, 0.76);
      --line: rgba(20, 27, 58, 0.14);
      --text: #181f2f;
      --muted: #44506a;
      --accent: #1f4eff;
      --accent-soft: rgba(31, 78, 255, 0.12);
      --danger: #d43d4d;
      --shadow: 0 14px 40px rgba(36, 46, 70, 0.15);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Inter", "Segoe UI", Roboto, Arial, sans-serif;
      color: var(--text);
      background: var(--bg);
      padding: 24px;
      letter-spacing: 0.01em;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    .shell {
      width: min(980px, 100%);
      background: var(--panel);
      border-radius: 18px;
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      padding: 24px;
      backdrop-filter: blur(4px);
      animation: fadeIn 0.45s ease;
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(1.3rem, 2.6vw, 2rem);
      letter-spacing: -0.02em;
    }

    .description {
      margin: 0 0 18px;
      color: var(--muted);
    }

    .grid {
      display: grid;
      gap: 18px;
      grid-template-columns: 1fr 1.2fr;
    }

    @media (max-width: 860px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }

    section {
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 14px;
      padding: 16px;
    }

    section h2 {
      margin: 0 0 10px;
      font-size: 1.05rem;
    }

    form {
      display: grid;
      gap: 10px;
    }

    label {
      font-weight: 600;
      font-size: 0.92rem;
    }

    input,
    select,
    button {
      border-radius: 10px;
      border: 1px solid var(--line);
      padding: 10px 12px;
      font-size: 0.96rem;
      background: #fbfcff;
    }

    input:disabled,
    select:disabled,
    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    input[type="number"] {
      width: 120px;
    }

    button {
      cursor: pointer;
      border-color: transparent;
      background: var(--accent);
      color: #fff;
      font-weight: 700;
      transition: transform 0.15s ease, filter 0.2s ease;
    }

    button:hover:not(:disabled) {
      filter: brightness(1.06);
      transform: translateY(-1px);
    }

    button.secondary {
      background: var(--accent-soft);
      color: #1b2f63;
      border: 1px solid rgba(31, 78, 255, 0.22);
    }

    .danger {
      background: var(--danger);
    }

    .list-actions {
      margin-top: 8px;
      display: flex;
      gap: 10px;
      justify-content: flex-end;
    }

    .search-box {
      width: min(340px, 100%);
      margin: 6px 0 0;
      padding: 8px 10px;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: #fbfcff;
      font-size: 0.92rem;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.93rem;
      margin-top: 6px;
    }

    th,
    td {
      border-bottom: 1px solid var(--line);
      text-align: left;
      padding: 8px 6px;
      vertical-align: top;
    }

    th {
      color: #2e3a5a;
      font-weight: 700;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .status {
      margin: 8px 0 0;
      min-height: 1.2em;
      font-size: 0.91rem;
      color: var(--muted);
    }

    .ok { color: #2b8a57; }
    .err { color: var(--danger); }

    .pending {
      color: #556183;
      opacity: 0.7;
      font-style: italic;
    }

    .skeleton {
      color: #77839e;
      font-size: 0.93rem;
      margin-top: 20px;
    }

    .hint {
      color: #6a738a;
      font-size: 0.84rem;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <h1>Policy Rule Manager</h1>
    <p class="description">사용자 정책을 직접 추가하고 삭제해서 즉시 반영할 수 있는 화면입니다.</p>

    <div class="grid">
      <section>
        <h2>새 규칙 추가</h2>
        <form id="add-form">
          <label>이름</label>
          <input id="name" name="name" required maxlength="200" placeholder="예: Windows temp file block" />

          <label>패턴</label>
          <input id="pattern" name="pattern" required maxlength="1000" placeholder="예: temp" />

          <label>타입</label>
          <select id="pattern-type" name="pattern_type" required>
            <option value="exact">exact</option>
            <option value="contains">contains</option>
            <option value="regex">regex</option>
            <option value="hash">hash</option>
            <option value="file_path">file_path</option>
          </select>

          <label>심각도</label>
          <input id="severity" name="severity" type="number" min="0" max="1000" value="50" required />
          <small class="hint">참고: severity 0은 화이트리스트(허용) 규칙입니다.</small>

          <button id="add-btn" type="submit">추가</button>
        </form>
      </section>

      <section>
        <h2>현재 규칙</h2>
        <div class="list-actions">
          <button class="secondary" id="reload" type="button">새로고침</button>
          <button class="danger" id="delete-btn" type="button">선택 삭제</button>
        </div>
        <input id="search" class="search-box" type="text" placeholder="idx 또는 이름 검색 (이름은 포함 검색)" />
        <div id="status" class="status" role="status" aria-live="polite"></div>
        <div id="list-wrap">
          <p class="skeleton">규칙을 불러오는 중…</p>
        </div>
      </section>
    </div>
  </main>

  <script>
    const apiBase = '/user/updater';
    const state = { rules: [], loading: false, query: '' };

    const form = document.getElementById('add-form');
    const reloadBtn = document.getElementById('reload');
    const deleteBtn = document.getElementById('delete-btn');
    const searchInput = document.getElementById('search');
    const listWrap = document.getElementById('list-wrap');
    const statusEl = document.getElementById('status');
    const addBtn = document.getElementById('add-btn');

    const nameInput = document.getElementById('name');
    const patternInput = document.getElementById('pattern');
    const patternTypeInput = document.getElementById('pattern-type');
    const severityInput = document.getElementById('severity');

    const allowedPatternTypes = new Set(['exact', 'contains', 'regex', 'hash', 'file_path']);

    const withStatus = (msg, kind = '') => {
      statusEl.textContent = msg || '';
      statusEl.className = `status ${kind}`;
    };

    const renderSeverity = (value) => {
      if (value === 0) {
        return '<span style="color:#2b8a57;font-weight:700">화이트리스트(0)</span>';
      }
      return `${value}`;
    };

    const parseBodyText = async (response) => {
      const text = await response.text();
      const ct = response.headers.get('content-type') || '';
      if (!text) {
        return '';
      }
      if (!ct.includes('application/json')) {
        return text;
      }
      try {
        return JSON.parse(text);
      } catch {
        return text;
      }
    };

    const escapeHtml = (value) => {
      return String(value)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    };

    const setBusy = (loading) => {
      state.loading = loading;
      addBtn.disabled = loading;
      reloadBtn.disabled = loading;
      deleteBtn.disabled = loading;
      nameInput.disabled = loading;
      patternInput.disabled = loading;
      patternTypeInput.disabled = loading;
      severityInput.disabled = loading;
    };

    const validatePayload = (payload) => {
      if (payload.name.length < 1 || payload.name.length > 200) {
        return '이름은 1자 이상 200자 이하로 입력해주세요.';
      }
      if (payload.pattern.length < 1 || payload.pattern.length > 1000) {
        return '패턴은 1자 이상 1000자 이하로 입력해주세요.';
      }
      if (!allowedPatternTypes.has(payload.pattern_type)) {
        return 'pattern_type 값이 올바르지 않습니다.';
      }
      if (!Number.isInteger(payload.severity)) {
        return '심각도는 정수여야 합니다.';
      }
      if (payload.severity < 0 || payload.severity > 1000) {
        return '심각도는 0~1000 사이여야 합니다.';
      }
      return '';
    };

    const render = () => {
      const keyword = state.query.trim().toLowerCase();
      const maybeIdx = Number(keyword);
      const hasQuery = keyword.length > 0;

      const filtered = state.rules.filter((r) => {
        const matchIdx =
          Number.isInteger(maybeIdx) &&
          String(maybeIdx) === keyword &&
          r.idx != null &&
          String(r.idx) === keyword;

        const matchName = r.name && String(r.name).toLowerCase().includes(keyword);
        return !hasQuery || matchIdx || matchName;
      });

      if (!state.rules.length) {
        listWrap.innerHTML = '<p class="skeleton">등록된 정책이 없습니다.</p>';
        return;
      }

      if (!filtered.length) {
        listWrap.innerHTML = `<p class="skeleton">검색 결과가 없습니다.</p>`;
        return;
      }

      const rows = filtered
        .map((r) => `
          <tr>
            <td>
              ${r.idx == null ? '' : `<input type="checkbox" data-idx="${r.idx}" />`}
            </td>
            <td>${r.idx == null ? '-' : r.idx}</td>
            <td>${escapeHtml(r.name)}</td>
            <td>${escapeHtml(r.pattern)}</td>
            <td>${escapeHtml(r.pattern_type)}</td>
            <td>${renderSeverity(r.severity)}</td>
            <td>${r._pending ? '<span class="pending">저장중</span>' : ''}</td>
          </tr>
        `).join('');

      listWrap.innerHTML = `
        <table>
          <thead>
            <tr>
              <th><input type="checkbox" id="select-all" /></th>
              <th>IDX</th>
              <th>이름</th>
              <th>패턴</th>
              <th>타입</th>
              <th>심각도</th>
              <th>상태</th>
            </tr>
          </thead>
          <tbody>
            ${rows}
          </tbody>
        </table>
      `;

      const selectAll = document.getElementById('select-all');
      selectAll.addEventListener('change', (event) => {
        const checked = event.target.checked;
        listWrap.querySelectorAll('input[data-idx]').forEach((checkbox) => {
          checkbox.checked = checked;
        });
      });
    };

    const loadRules = async () => {
      setBusy(true);
      withStatus('목록을 불러오는 중…');
      try {
        const response = await fetch(apiBase, { method: 'GET' });
        const body = await parseBodyText(response);
        if (!response.ok) {
          throw new Error(`목록 조회 실패 (${response.status}): ${JSON.stringify(body)}`);
        }
        if (!Array.isArray(body)) {
          throw new Error('규칙 응답 형식이 올바르지 않습니다.');
        }
        state.rules = body;
        render();
        withStatus('최신 규칙 목록을 반영했습니다.', 'ok');
      } catch (err) {
        console.error(err);
        state.rules = [];
        render();
        withStatus(err.message || '목록을 불러오지 못했습니다.', 'err');
      } finally {
        setBusy(false);
      }
    };

    const addRule = async (event) => {
      event.preventDefault();

      const payload = {
        name: nameInput.value.trim(),
        pattern: patternInput.value.trim(),
        pattern_type: patternTypeInput.value,
        severity: Number(severityInput.value),
      };

      const validationError = validatePayload(payload);
      if (validationError) {
        withStatus(validationError, 'err');
        return;
      }

      const tempRule = {
        _tempId: `pending-${Date.now()}`,
        idx: null,
        name: payload.name,
        pattern: payload.pattern,
        pattern_type: payload.pattern_type,
        severity: payload.severity,
        _pending: true,
      };

      state.rules = [...state.rules, tempRule];
      render();
      setBusy(true);
      withStatus('정책을 추가하는 중…');

      try {
        const response = await fetch(apiBase, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });
        const body = await parseBodyText(response);
        if (!response.ok) {
          throw new Error(`추가 실패 (${response.status}): ${JSON.stringify(body)}`);
        }
        if (!body || typeof body.idx !== 'number') {
          throw new Error('추가 응답 값이 올바르지 않습니다.');
        }

        state.rules = state.rules.map((r) => {
          if (r._tempId === tempRule._tempId) {
            return {
              idx: body.idx,
              name: r.name,
              pattern: r.pattern,
              pattern_type: r.pattern_type,
              severity: r.severity,
              _pending: false,
            };
          }
          return r;
        });
        form.reset();
        withStatus(`정책이 추가되었습니다. (idx: ${body.idx})`, 'ok');
        await loadRules();
      } catch (err) {
        console.error(err);
        state.rules = state.rules.filter((r) => r._tempId !== tempRule._tempId);
        render();
        withStatus(err.message || '추가 중 오류가 발생했습니다.', 'err');
      } finally {
        setBusy(false);
      }
    };

    const deleteSelected = async () => {
      const selected = [...listWrap.querySelectorAll('input[data-idx]:checked')].map((el) => Number(el.dataset.idx));
      if (!selected.length) {
        withStatus('삭제할 규칙을 1개 이상 선택해주세요.', 'err');
        return;
      }

      if (!confirm(`${selected.length}개 규칙을 삭제할까요?`)) {
        return;
      }

      const previous = [...state.rules];
      state.rules = state.rules.filter((r) => !selected.includes(r.idx));
      render();
      setBusy(true);
      withStatus('선택한 규칙을 삭제하는 중…');

      try {
        const response = await fetch(apiBase, {
          method: 'DELETE',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ idxs: selected }),
        });
        const body = await parseBodyText(response);
        if (!response.ok) {
          throw new Error(`삭제 실패 (${response.status}): ${JSON.stringify(body)}`);
        }
        withStatus(`${body.deleted}개 규칙이 삭제되었습니다.`, 'ok');
        await loadRules();
      } catch (err) {
        console.error(err);
        state.rules = previous;
        render();
        withStatus(err.message || '삭제 중 오류가 발생했습니다.', 'err');
      } finally {
        setBusy(false);
      }
    };

    const applySearch = (event) => {
      state.query = event.target.value || '';
      render();
    };

    form.addEventListener('submit', addRule);
    reloadBtn.addEventListener('click', loadRules);
    deleteBtn.addEventListener('click', deleteSelected);
    searchInput.addEventListener('input', applySearch);

    loadRules();
  </script>
</body>
</html>
